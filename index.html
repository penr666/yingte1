<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盈特数据可视化平台</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
/* ===== CSS 变量 ===== */
:root {
  --primary: #4A6CF7;
  --primary-light: #6B8AFF;
  --primary-dark: #3451DB;
  --primary-glow: rgba(74,108,247,0.25);
  --accent: #00D4FF;
  --accent-glow: rgba(0,212,255,0.2);
  --success: #00C48C;
  --warning: #FFB547;
  --danger: #FF5C72;
  --info: #3B82F6;
  /* 深色侧边栏 */
  --sidebar-bg: #0D1121;
  --sidebar-hover: rgba(74,108,247,0.1);
  --sidebar-active: rgba(74,108,247,0.18);
  /* 白色主内容区 */
  --bg: #F5F7FA;
  --bg-secondary: #FFFFFF;
  --card-bg: #FFFFFF;
  --card-border: #E8ECF0;
  --card-hover: #F0F4FF;
  --text-primary: #1F2937;
  --text-secondary: #6B7280;
  --text-light: #9CA3AF;
  --border: #E5E7EB;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-glow: 0 2px 12px rgba(74,108,247,0.12);
  --radius: 10px;
  --radius-lg: 12px;
  --sidebar-width: 240px;
  --topbar-height: 56px;
  --glass: rgba(255,255,255,0.85);
  --glass-border: rgba(0,0,0,0.05);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ===== 滚动条 ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

/* ===== 布局 ===== */
#app { display: flex; height: 100vh; }

/* ===== 侧边栏（保持深色科技风） ===== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--sidebar-bg);
  border-right: 1px solid rgba(74,108,247,0.1);
  display: flex;
  flex-direction: column;
  transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
}
.sidebar::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, var(--primary) 0%, transparent 50%, var(--accent) 100%);
  opacity: 0.3;
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid rgba(74,108,247,0.1);
  position: relative;
}
.sidebar-header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20px;
  right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  opacity: 0.4;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 16px var(--primary-glow);
}
.logo-icon svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 2; }
.logo-text {
  font-size: 16px;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.5px;
}

.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.nav-section { margin-bottom: 2px; }
.nav-section-title {
  padding: 14px 20px 4px;
  font-size: 10px;
  text-transform: uppercase;
  color: #5A6478;
  letter-spacing: 1.5px;
  font-weight: 600;
}
/* 可折叠业务板块标题 */
.nav-group-header {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  gap: 10px;
  color: #C8CED8;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  user-select: none;
}
.nav-group-header:hover { color: #fff; background: var(--sidebar-hover); }
.nav-group-header .group-icon {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.nav-group-header .group-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-group-header .group-arrow {
  margin-left: auto;
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.3s;
  color: #5A6478;
}
.nav-group-header .group-arrow svg { width: 12px; height: 12px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.nav-group-header.collapsed .group-arrow { transform: rotate(-90deg); }
.nav-group-items { overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
.nav-group-items.collapsed { max-height: 0 !important; }
.nav-item {
  display: flex;
  align-items: center;
  padding: 9px 20px 9px 52px;
  gap: 10px;
  color: #8B95A8;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  font-size: 13px;
  position: relative;
  border-left: 2px solid transparent;
  margin: 1px 0;
}
.nav-item.top-level {
  padding-left: 20px;
}
.nav-item:hover {
  background: var(--sidebar-hover);
  color: #E8ECF4;
  border-left-color: rgba(74,108,247,0.3);
}
.nav-item.active {
  background: var(--sidebar-active);
  color: #fff;
  border-left-color: var(--primary);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 20px;
  background: var(--primary);
  border-radius: 0 3px 3px 0;
  box-shadow: 0 0 8px var(--primary-glow);
}
.nav-icon {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.nav-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-label { white-space: nowrap; font-weight: 500; }
.nav-badge {
  margin-left: auto;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff;
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 10px;
  font-weight: 600;
}
.nav-badge.soon {
  background: rgba(255,181,71,0.15);
  color: #FFB547;
}

/* ===== 主内容 ===== */
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

/* 顶部栏 */
.topbar {
  height: var(--topbar-height);
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.menu-toggle { font-size: 20px; color: var(--text-secondary); display: none; }
.breadcrumb { font-size: 14px; color: var(--text-secondary); font-weight: 500; }
.breadcrumb span { color: var(--text-primary); font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.global-filter { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
.global-filter select {
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  background: #fff;
  color: var(--text-primary);
  outline: none;
}
.global-filter select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(74,108,247,0.12); }
.topbar-actions { display: flex; align-items: center; gap: 10px; }
.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: all 0.2s;
}
.icon-btn:hover { background: #F0F4FF; color: var(--primary); }
.icon-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.user-avatar {
  width: 34px;
  height: 34px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #fff;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
}
.user-name { font-size: 13px; color: var(--text-primary); font-weight: 500; }

/* ===== 页面容器（白色底） ===== */
.page-container {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  background: var(--bg);
}

/* ===== 通用组件 ===== */
/* 卡片 */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 20px;
  transition: all 0.3s;
  box-shadow: var(--shadow);
}
.card:hover { box-shadow: var(--shadow-md); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-actions { display: flex; gap: 8px; }

/* 统计卡片 */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  opacity: 0;
  transition: opacity 0.3s;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-glow); border-color: rgba(74,108,247,0.15); }
.stat-card:hover::before { opacity: 1; }
.stat-card.blue::before { background: linear-gradient(90deg, var(--primary), var(--accent)); }
.stat-card.green::before { background: linear-gradient(90deg, var(--success), #00D4FF); }
.stat-card.yellow::before { background: linear-gradient(90deg, var(--warning), #FF8A00); }
.stat-card.red::before { background: linear-gradient(90deg, var(--danger), #FF8A00); }
.stat-card.purple::before { background: linear-gradient(90deg, #8B5CF6, var(--primary)); }

.stat-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.stat-icon svg { width: 22px; height: 22px; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.stat-icon.blue { background: rgba(74,108,247,0.08); }
.stat-icon.blue svg { stroke: var(--primary); }
.stat-icon.green { background: rgba(0,196,140,0.08); }
.stat-icon.green svg { stroke: var(--success); }
.stat-icon.yellow { background: rgba(255,181,71,0.08); }
.stat-icon.yellow svg { stroke: var(--warning); }
.stat-icon.red { background: rgba(255,92,114,0.08); }
.stat-icon.red svg { stroke: var(--danger); }
.stat-icon.purple { background: rgba(139,92,246,0.08); }
.stat-icon.purple svg { stroke: #8B5CF6; }

.stat-info { flex: 1; }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.stat-value { font-size: 26px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
.stat-change { font-size: 12px; margin-top: 4px; font-weight: 500; }
.stat-change.up { color: var(--success); }
.stat-change.down { color: var(--danger); }

/* 图表容器 */
.chart-grid { display: grid; gap: 20px; }
.chart-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
.chart-grid.cols-1 { grid-template-columns: 1fr; }
.chart-box {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: all 0.3s;
  box-shadow: var(--shadow);
}
.chart-box:hover { box-shadow: var(--shadow-md); }
.chart-box .chart-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.chart-container { width: 100%; height: 320px; }

/* 数据表格 */
.data-table-wrapper { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead th {
  background: #F8FAFC;
  color: var(--text-secondary);
  font-weight: 600;
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  vertical-align: middle;
}
.data-table thead tr + tr th {
  border-top: none;
  padding-top: 6px;
  padding-bottom: 10px;
}
.data-table tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid #F1F5F9;
  color: var(--text-primary);
}
.data-table tbody tr { transition: background 0.2s; }
.data-table tbody tr:hover { background: #F8FAFC; }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table .positive { color: var(--success); }
.data-table .negative { color: var(--danger); }

/* 筛选器 */
.filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-bar label { font-size: 12px; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.filter-bar select, .filter-bar input {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  background: #fff;
  color: var(--text-primary);
  outline: none;
  transition: all 0.2s;
}
.filter-bar select:focus, .filter-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(74,108,247,0.12); }
.filter-bar .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; transition: all 0.25s; letter-spacing: 0.3px; cursor: pointer; }
.filter-bar .btn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  box-shadow: 0 2px 8px rgba(74,108,247,0.3);
}
.btn-primary:hover { box-shadow: 0 4px 16px rgba(74,108,247,0.35); transform: translateY(-1px); }
.btn-outline {
  border: 1px solid var(--border);
  color: var(--text-secondary);
  background: #fff;
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); background: #F0F4FF; }

/* 页面标题 */
.page-header { margin-bottom: 24px; }
.page-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 4px;
  letter-spacing: -0.3px;
}
.page-desc { font-size: 13px; color: var(--text-secondary); }

/* Tab切换 */
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab-item {
  padding: 10px 22px;
  font-size: 13px;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.25s;
  font-weight: 600;
}
.tab-item:hover { color: var(--primary); }
.tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

/* 甘特图 */
.gantt-wrapper { overflow-x: auto; }
.gantt-chart { min-width: 900px; }
.gantt-header { display: flex; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
.gantt-header-cell { flex: 1; text-align: center; font-size: 12px; color: var(--text-secondary); font-weight: 600; }
.gantt-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #F1F5F9; }
.gantt-label { width: 200px; font-size: 13px; color: var(--text-primary); flex-shrink: 0; padding-right: 12px; font-weight: 500; }
.gantt-bars { flex: 1; position: relative; height: 30px; }
.gantt-bar {
  position: absolute;
  height: 24px;
  top: 3px;
  border-radius: 6px;
  font-size: 11px;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 10px;
  white-space: nowrap;
  overflow: hidden;
  font-weight: 500;
}

/* 状态标签 */
.tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
.pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); display: inline-block; animation: pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,196,140,0.4); } 50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(0,196,140,0); } }
.tag-blue { background: rgba(74,108,247,0.08); color: var(--primary); }
.tag-green { background: rgba(0,196,140,0.08); color: var(--success); }
.tag-yellow { background: rgba(255,181,71,0.08); color: #D97706; }
.tag-red { background: rgba(255,92,114,0.08); color: var(--danger); }
.tag-purple { background: rgba(139,92,246,0.08); color: #7C3AED; }

/* 空状态 */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state .title { font-size: 16px; color: var(--text-secondary); margin-bottom: 4px; }
.empty-state .desc { font-size: 13px; }

/* 快捷入口卡片 */
.shortcut-card {
  display: flex !important;
  align-items: center;
  gap: 10px;
  padding: 14px 18px !important;
  border: 1px solid var(--card-border) !important;
  border-radius: 10px !important;
  transition: all 0.25s !important;
  background: var(--card-bg);
  box-shadow: var(--shadow);
}
.shortcut-card:hover {
  border-color: var(--primary) !important;
  background: #F0F4FF !important;
  box-shadow: var(--shadow-glow);
  transform: translateY(-2px);
}
.shortcut-card .sc-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.shortcut-card .sc-icon svg { width: 18px; height: 18px; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.shortcut-card .sc-icon.blue { background: rgba(74,108,247,0.08); }
.shortcut-card .sc-icon.blue svg { stroke: var(--primary); }
.shortcut-card .sc-icon.green { background: rgba(0,196,140,0.08); }
.shortcut-card .sc-icon.green svg { stroke: var(--success); }
.shortcut-card .sc-icon.yellow { background: rgba(255,181,71,0.08); }
.shortcut-card .sc-icon.yellow svg { stroke: var(--warning); }
.shortcut-card .sc-icon.red { background: rgba(255,92,114,0.08); }
.shortcut-card .sc-icon.red svg { stroke: var(--danger); }
.shortcut-card .sc-icon.purple { background: rgba(139,92,246,0.08); }
.shortcut-card .sc-icon.purple svg { stroke: #8B5CF6; }

/* 页面过渡 */
.page-content { animation: fadeIn 0.35s cubic-bezier(0.4,0,0.2,1); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ===== 自定义报表构建器 ===== */
.rb-layout { display: flex; gap: 0; height: calc(100vh - var(--topbar-height) - 48px); margin: -24px; }
.rb-sidebar { width: 280px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
.rb-sidebar-title { padding: 16px 20px; font-size: 14px; font-weight: 700; color: var(--text-primary); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.rb-sidebar-scroll { flex: 1; overflow-y: auto; padding: 12px; }
.rb-section-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; padding: 8px 4px 6px; }

// ===== 全局状态 =====
let currentPage = 'dashboard';
const charts = {};

// ===== 菜单折叠 =====
function toggleNavGroup(header) {
  const items = header.nextElementSibling;
  const isCollapsed = header.classList.toggle('collapsed');
  if (isCollapsed) {
    items.style.maxHeight = '0px';
    items.classList.add('collapsed');
  } else {
    items.classList.remove('collapsed');
    items.style.maxHeight = items.scrollHeight + 'px';
  }
}

// 初始化所有菜单组为展开状态
function initNavGroups() {
  document.querySelectorAll('.nav-group-items').forEach(el => {
    el.style.maxHeight = el.scrollHeight + 'px';
  });
}

// ===== 导航切换 =====
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', (e) => {
    e.preventDefault();
    const page = item.dataset.page;
    if (page && page !== currentPage) {
      navigateTo(page);
    }
  });
});

// 设计状态页 - 刷新按钮交互
function handleRefresh(btn) {
  if (btn.classList.contains('btn-refreshing')) return;
  btn.classList.add('btn-refreshing');
  btn.disabled = true;
  // 模拟刷新请求
  setTimeout(() => {
    btn.classList.remove('btn-refreshing');
    btn.disabled = false;
    // 更新刷新时间
    const timeEl = btn.parentElement.querySelector('.refresh-time');
    if (timeEl) {
      const now = new Date();
      const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
      timeEl.textContent = '最近刷新：' + ts;
    }
  }, 1200);
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (navItem) {
    navItem.classList.add('active');
    // 确保所属的菜单组是展开的
    const groupItems = navItem.closest('.nav-group-items');
    if (groupItems && groupItems.classList.contains('collapsed')) {
      const header = groupItems.previousElementSibling;
      if (header) toggleNavGroup(header);
    }
  }
  
  const pageNames = {
    dashboard: '工作台',
    order: '订单报表',
    budget: '预算管理',
    customer: '客户分析',
    purchase: '采购管理',
    finance: '结算财务',
    inventory: '库存分析',
    design: '设计分析',
    production: '生产排产',
    datasource: '数据源管理',
    'report-builder': '自定义报表',
    permissions: '权限管理',
    'offline-data': '线下数据维护'
  };
  
  // 面包屑增加板块路径
  const pageGroups = {
    order: '订单 & 销售',
    budget: '订单 & 销售',
    customer: '订单 & 销售',
    purchase: '采购',
    finance: '财务',
    inventory: '生产',
    design: '生产',
    production: '生产'
  };
  
  const group = pageGroups[page];
  const breadcrumb = document.getElementById('breadcrumb');
  if (group) {
    breadcrumb.innerHTML = `<span style="color:var(--text-light);font-weight:400;">${group}</span> <span style="margin:0 6px;color:var(--text-light);">/</span> <span>${pageNames[page] || page}</span>`;
  } else {
    breadcrumb.innerHTML = `<span>${pageNames[page] || page}</span>`;
  }
  
  renderPage(page);
}

// ===== 页面渲染 =====
function renderPage(page) {
  Object.values(charts).forEach(c => c.dispose());
  Object.keys(charts).forEach(k => delete charts[k]);
  
  const container = document.getElementById('pageContainer');
  const renderers = {
    dashboard: renderDashboard,
    order: renderOrder,
    budget: renderBudget,
    customer: renderCustomer,
    purchase: renderPurchase,
    finance: renderFinance,
    inventory: renderInventory,
    design: renderDesign,
    production: renderProduction,
    datasource: renderDatasource,
    'report-builder': renderReportBuilder,
    permissions: renderPermissions,
    'offline-data': renderOfflineData
  };
  
  const renderer = renderers[page];
  if (renderer) {
    container.innerHTML = `<div class="page-content">${renderer()}</div>`;
    if (typeof initPageCharts === 'function') initPageCharts(page);
  } else {
    container.innerHTML = `<div class="page-content"><div class="empty-state"><div class="icon">🚧</div><div class="title">功能开发中</div><div class="desc">该模块正在建设中，敬请期待</div></div></div>`;
  }
}

function randData(count, min, max) {
  return Array.from({length: count}, () => Math.round(min + Math.random() * (max - min)));
}

function formatNum(n) {
  if (n >= 10000) return (n/10000).toFixed(1) + '万';
  return n.toLocaleString();
}

function switchPermTab(el, tabId) {
  el.parentElement.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['perm-role','perm-data','perm-user'].forEach(id => {
    document.getElementById(id).style.display = id === tabId ? '' : 'none';
  });
}

            <button class="toolbar-btn ${rbState.layout==='1'?'active':''}" onclick="rbSetLayout('1')" title="单列布局">${ICONS.list || ''}</button>
            <button class="toolbar-btn ${rbState.layout==='2'?'active':''}" onclick="rbSetLayout('2')" title="双列布局">${ICONS.grid || ''}</button>
            <button class="toolbar-btn ${rbState.layout==='3'?'active':''}" onclick="rbSetLayout('3')" title="三列布局">${ICONS.builder || ''}</button>
          </div>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" onclick="rbAddWidget('kpi')" title="添加KPI指标卡">${ICONS.trending || ''} KPI</button>
          <button class="toolbar-btn" onclick="rbAddWidget('bar')" title="添加柱状图">${ICONS.barChart || ''} 柱状图</button>
          <button class="toolbar-btn" onclick="rbAddWidget('line')" title="添加折线图">${ICONS.lineChart || ''} 折线图</button>
          <button class="toolbar-btn" onclick="rbAddWidget('pie')" title="添加饼图">${ICONS.pieChart || ''} 饼图</button>
          <button class="toolbar-btn" onclick="rbAddWidget('table')" title="添加数据表格">${ICONS.table || ''} 表格</button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn primary" onclick="rbSaveReport()">${ICONS.save || ''} 保存</button>
          <button class="toolbar-btn" onclick="rbPreviewReport()">${ICONS.eye || ''} 预览</button>

          <div class="rb-canvas ${rbState.widgets.length?'has-items':''}" id="rbCanvas"
               ondragover="rbCanvasDragOver(event)" ondragleave="rbCanvasDragLeave(event)" ondrop="rbCanvasDrop(event)">
            <div id="rbWidgetsContainer" class="rb-grid-${rbState.layout}">
              ${rbState.widgets.length === 0 ? `
                <div class="rb-empty" style="grid-column: 1 / -1;">
                  <div class="empty-icon">${ICONS.builder || '📊'}</div>
                  <div class="empty-title">拖拽数据源到此处，或点击上方按钮添加组件</div>
                  <div class="empty-desc">从左侧选择数据源 → 选择字段拖入配置面板 → 自动生成可视化图表<br/>支持柱状图、折线图、饼图、KPI指标卡、数据表格</div>

          <div style="text-align:center;padding:40px 10px;color:var(--text-light);font-size:13px;">

      </div>

  `;
}

// 选择数据源
function rbSelectDataSource(dsId) {
  rbState.activeDs = dsId;
  const ds = rbDataSources.find(d => d.id === dsId);
  if (!ds) return;
  
  document.getElementById('rb-fields-section').style.display = '';
  document.getElementById('rb-ds-label').textContent = '· ' + ds.name;
  
  const list = document.getElementById('rb-field-list');
  list.innerHTML = ds.fields.map(f => `
    <div class="rb-field-item" draggable="true" ondragstart="rbDragField(event,'${dsId}','${f}')">
      <span class="field-drag">${ICONS.drag || '⋮⋮'}</span>
      <span>${f}</span>
    </div>
  `).join('');
}

// 拖拽数据源
function rbDragDataSource(e, dsId) {
  e.dataTransfer.setData('type', 'datasource');
  e.dataTransfer.setData('dsId', dsId);
}

// 拖拽字段
function rbDragField(e, dsId, field) {
  e.dataTransfer.setData('type', 'field');
  e.dataTransfer.setData('dsId', dsId);
  e.dataTransfer.setData('field', field);
}

// 画布拖拽事件
function rbCanvasDragOver(e) {
  e.preventDefault();
  document.getElementById('rbCanvas').classList.add('drag-over');
}
function rbCanvasDragLeave(e) {
  document.getElementById('rbCanvas').classList.remove('drag-over');
}
function rbCanvasDrop(e) {
  e.preventDefault();
  document.getElementById('rbCanvas').classList.remove('drag-over');
  
  const type = e.dataTransfer.getData('type');
  if (type === 'datasource') {
    const dsId = e.dataTransfer.getData('dsId');
    rbAddWidgetFromDS(dsId, 'bar');
  }
}

// 设置布局
function rbSetLayout(n) {
  rbState.layout = n;
  const container = document.getElementById('rbWidgetsContainer');
  container.className = `rb-grid-${n}`;
  // 更新toolbar按钮状态
  document.querySelectorAll('.rb-toolbar .toolbar-group .toolbar-btn').forEach(btn => btn.classList.remove('active'));
  event.target.closest('.toolbar-btn').classList.add('active');
}

// 添加组件（从工具栏）
function rbAddWidget(chartType) {
  const widgetId = 'w' + (++rbState.widgetCounter);
  const ds = rbState.activeDs ? rbDataSources.find(d => d.id === rbState.activeDs) : rbDataSources[0];
  const widget = {
    id: widgetId,
    type: chartType,
    dsId: ds.id,
    title: rbGetDefaultTitle(chartType, ds.name),
    fields: rbGetDefaultFields(chartType, ds),
    config: rbGetDefaultConfig(chartType),
  };
  rbState.widgets.push(widget);
  rbState.selectedWidget = widgetId;
  rbRefreshCanvas();
  rbRenderConfig();
}

// 从数据源拖入画布自动创建组件
function rbAddWidgetFromDS(dsId, chartType) {
  const ds = rbDataSources.find(d => d.id === dsId);
  if (!ds) return;
  const widgetId = 'w' + (++rbState.widgetCounter);
  const widget = {
    id: widgetId,
    type: chartType || 'bar',
    dsId: ds.id,
    title: rbGetDefaultTitle(chartType || 'bar', ds.name),
    fields: rbGetDefaultFields(chartType || 'bar', ds),
    config: rbGetDefaultConfig(chartType || 'bar'),
  };
  rbState.widgets.push(widget);
  rbState.activeDs = dsId;
  rbState.selectedWidget = widgetId;
  rbRefreshCanvas();
  rbRefreshFields();
  rbRenderConfig();
}

function rbGetDefaultTitle(type, dsName) {
  const map = { bar: '柱状图', line: '折线图', pie: '饼图', kpi: 'KPI指标', table: '数据表格' };
  return dsName + ' - ' + (map[type] || type);
}

function rbGetDefaultFields(type, ds) {
  if (type === 'kpi') return ds.fields.slice(0, 4);
  if (type === 'table') return ds.fields.slice(0, 6);
  if (type === 'pie') return [ds.fields[0], ds.fields[1]];
  return [ds.fields[0], ds.fields[1], ds.fields[2] || ds.fields[0]];
}

function rbGetDefaultConfig(type) {
  return { showLegend: true, showLabel: false };
}

// 渲染单个组件
function rbRenderWidget(w) {
  const selected = rbState.selectedWidget === w.id ? ' selected' : '';
  const typeMap = { bar: '柱状图', line: '折线图', pie: '饼图', kpi: 'KPI', table: '表格' };
  return `
    <div class="rb-widget${selected}" id="widget-${w.id}" onclick="rbSelectWidget('${w.id}', event)">
      <div class="rb-widget-header">
        <span class="widget-title">${w.title}</span>
        <span class="widget-type">${typeMap[w.type] || w.type}</span>
        <div class="widget-actions">
          <span class="widget-action-btn" onclick="rbDuplicateWidget('${w.id}', event)" title="复制">${ICONS.copy || ''}</span>
          <span class="widget-action-btn" onclick="rbDeleteWidget('${w.id}', event)" title="删除">${ICONS.trash || ''}</span>
        </div>
      </div>
      <div class="rb-widget-body">
        <div class="chart-container" id="rb-chart-${w.id}"></div>
      </div>
    </div>
  `;
}

// 选择组件
function rbSelectWidget(widgetId, e) {
  if (e) e.stopPropagation();
  rbState.selectedWidget = widgetId;
  document.querySelectorAll('.rb-widget').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('widget-' + widgetId);
  if (el) el.classList.add('selected');
  rbRenderConfig();
}

// 删除组件
function rbDeleteWidget(widgetId, e) {
  if (e) e.stopPropagation();
  rbState.widgets = rbState.widgets.filter(w => w.id !== widgetId);
  if (rbState.selectedWidget === widgetId) rbState.selectedWidget = null;
  rbRefreshCanvas();
  rbRenderConfig();
}

// 复制组件
function rbDuplicateWidget(widgetId, e) {
  if (e) e.stopPropagation();
  const src = rbState.widgets.find(w => w.id === widgetId);
  if (!src) return;
  const newId = 'w' + (++rbState.widgetCounter);
  rbState.widgets.push({ ...src, id: newId, title: src.title + ' (副本)' });
  rbState.selectedWidget = newId;
  rbRefreshCanvas();
  rbRenderConfig();
}

// 刷新画布
function rbRefreshCanvas() {
  const canvas = document.getElementById('rbCanvas');
  const container = document.getElementById('rbWidgetsContainer');
  canvas.classList.toggle('has-items', rbState.widgets.length > 0);
  container.className = `rb-grid-${rbState.layout}`;
  
  if (rbState.widgets.length === 0) {
    container.innerHTML = `
      <div class="rb-empty" style="grid-column: 1 / -1;">
        <div class="empty-icon">${ICONS.builder || '📊'}</div>
        <div class="empty-title">拖拽数据源到此处，或点击上方按钮添加组件</div>
        <div class="empty-desc">从左侧选择数据源 → 选择字段拖入配置面板 → 自动生成可视化图表</div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = rbState.widgets.map(w => rbRenderWidget(w)).join('');
  
  // 渲染图表
  setTimeout(() => {
    rbState.widgets.forEach(w => rbRenderChart(w));
  }, 100);
}

// 刷新字段列表
function rbRefreshFields() {
  if (rbState.activeDs) rbSelectDataSource(rbState.activeDs);
}

// 渲染配置面板
function rbRenderConfig() {
  const body = document.getElementById('rbConfigBody');
  const w = rbState.widgets.find(w => w.id === rbState.selectedWidget);
  
  if (!w) {
    body.innerHTML = `<div style="text-align:center;padding:40px 10px;color:var(--text-light);font-size:13px;">点击画布中的组件进行配置</div>`;
    return;
  }
  
  const ds = rbDataSources.find(d => d.id === w.dsId);
  const dsOptions = rbDataSources.map(d => `<option value="${d.id}" ${d.id===w.dsId?'selected':''}>${d.name}</option>`).join('');
  const typeOptions = [
    {v:'bar',l:'柱状图'},{v:'line',l:'折线图'},{v:'pie',l:'饼图'},{v:'kpi',l:'KPI指标'},{v:'table',l:'数据表格'}
  ].map(t => `<option value="${t.v}" ${t.v===w.type?'selected':''}>${t.l}</option>`).join('');
  
  body.innerHTML = `
    <div class="config-field">
      <div class="config-label">组件标题</div>
      <input class="config-input" value="${w.title}" oninput="rbUpdateWidget('${w.id}','title',this.value)" />
    </div>
    <div class="config-field">
      <div class="config-label">数据源</div>
      <select class="config-select" onchange="rbUpdateWidget('${w.id}','dsId',this.value)">${dsOptions}</select>
    </div>
    <div class="config-field">
      <div class="config-label">图表类型</div>
      <select class="config-select" onchange="rbUpdateWidget('${w.id}','type',this.value)">${typeOptions}</select>
    </div>
    <div class="config-field">
      <div class="config-label">已选字段</div>
      <div class="config-drop-zone ${w.fields.length===0?'empty':''}" id="rbFieldDropZone"
           ondragover="event.preventDefault();this.classList.add('drag-over')" 
           ondragleave="this.classList.remove('drag-over')"
           ondrop="rbFieldDrop(event,'${w.id}')">
        ${w.fields.map((f,i) => `<span class="field-tag">${f}<span class="remove" onclick="rbRemoveField('${w.id}',${i})">×</span></span>`).join('')}
      </div>
    </div>
    <div class="config-field">
      <div class="config-label">可用字段（点击添加）</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;">
        ${(ds ? ds.fields : []).filter(f => !w.fields.includes(f)).map(f => 
          `<span class="field-tag" style="cursor:pointer;background:#F1F5F9;color:var(--text-secondary);" onclick="rbAddField('${w.id}','${f}')">${f}</span>`
        ).join('')}
      </div>
    </div>
    <div class="config-field">
      <div class="config-label">显示图例</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);cursor:pointer;">
        <input type="checkbox" ${w.config.showLegend?'checked':''} onchange="rbUpdateConfig('${w.id}','showLegend',this.checked)" /> 显示图例
      </label>
    </div>
    <div class="config-field">
      <div class="config-label">显示数据标签</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);cursor:pointer;">
        <input type="checkbox" ${w.config.showLabel?'checked':''} onchange="rbUpdateConfig('${w.id}','showLabel',this.checked)" /> 显示标签
      </label>
    </div>
    <div style="padding-top:12px;border-top:1px solid var(--border);margin-top:8px;">
      <button class="toolbar-btn" style="width:100%;justify-content:center;color:var(--danger);border-color:rgba(255,92,114,0.3);" onclick="rbDeleteWidget('${w.id}')">
        ${ICONS.trash || ''} 删除此组件
      </button>
    </div>
  `;
}

// 更新组件属性
function rbUpdateWidget(widgetId, key, value) {
  const w = rbState.widgets.find(w => w.id === widgetId);
  if (!w) return;
  w[key] = value;
  if (key === 'dsId') {
    const ds = rbDataSources.find(d => d.id === value);
    w.fields = rbGetDefaultFields(w.type, ds);
  }
  if (key === 'type') {
    const ds = rbDataSources.find(d => d.id === w.dsId);
    w.fields = rbGetDefaultFields(value, ds);
    w.title = rbGetDefaultTitle(value, ds.name);
  }
  rbRefreshCanvas();
  rbRenderConfig();
}

function rbUpdateConfig(widgetId, key, value) {
  const w = rbState.widgets.find(w => w.id === widgetId);
  if (!w) return;
  w.config[key] = value;
  rbRenderChart(w);
}

// 拖入字段到配置面板
function rbFieldDrop(e, widgetId) {
  e.preventDefault();
  e.stopPropagation();
  document.getElementById('rbFieldDropZone').classList.remove('drag-over');
  
  const field = e.dataTransfer.getData('field');
  if (field) rbAddField(widgetId, field);
}

function rbAddField(widgetId, field) {
  const w = rbState.widgets.find(w => w.id === widgetId);
  if (!w || w.fields.includes(field)) return;
  w.fields.push(field);
  rbRefreshCanvas();
  rbRenderConfig();
}

function rbRemoveField(widgetId, index) {
  const w = rbState.widgets.find(w => w.id === widgetId);
  if (!w) return;
  w.fields.splice(index, 1);
  rbRefreshCanvas();
  rbRenderConfig();
}

// 渲染图表
function rbRenderChart(w) {
  if (w.type === 'table') { rbRenderTable(w); return; }
  if (w.type === 'kpi') { rbRenderKPI(w); return; }
  
  const el = document.getElementById('rb-chart-' + w.id);
  if (!el) return;
  
  if (charts['rb-' + w.id]) charts['rb-' + w.id].dispose();
  
  const chart = echarts.init(el, null, { renderer: 'canvas' });
  charts['rb-' + w.id] = chart;
  
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const colors = ['#4A6CF7','#00BCD4','#00C48C','#FFB547','#FF5C72','#8B5CF6'];
  
  let option = { backgroundColor: 'transparent', color: colors, tooltip: { trigger: 'axis' } };
  if (w.config.showLegend) option.legend = { top: 0, textStyle: { color: '#6B7280', fontSize: 11 } };
  option.grid = { left: 50, right: 20, top: w.config.showLegend ? 35 : 20, bottom: 30 };
  option.xAxis = { type: 'category', data: months, axisLine: { lineStyle: { color: '#E5E7EB' } }, axisLabel: { color: '#6B7280', fontSize: 11 } };
  option.yAxis = { type: 'value', axisLine: { lineStyle: { color: '#E5E7EB' } }, axisLabel: { color: '#6B7280', fontSize: 11 }, splitLine: { lineStyle: { color: '#F1F5F9' } } };
  
  const numFields = w.fields.filter((_, i) => i > 0);
  if (numFields.length === 0) { numFields.push(w.fields[0] || '数值'); }
  
  if (w.type === 'bar') {
    option.series = numFields.map((f, i) => ({
      name: f, type: 'bar', barWidth: numFields.length > 2 ? '15%' : '25%',
      data: Array.from({length: 12}, () => Math.round(200 + Math.random() * 600)),
      itemStyle: { borderRadius: [4,4,0,0], color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:colors[i%colors.length]},{offset:1,color:colors[i%colors.length]+'66'}]) }
    }));
  } else if (w.type === 'line') {
    option.series = numFields.map((f, i) => ({
      name: f, type: 'line', smooth: true,
      data: Array.from({length: 12}, () => Math.round(200 + Math.random() * 600)),
      lineStyle: { color: colors[i%colors.length], width: 2 }, itemStyle: { color: colors[i%colors.length] },
      areaStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:colors[i%colors.length]+'20'},{offset:1,color:'transparent'}]) }
    }));
  } else if (w.type === 'pie') {
    option.tooltip = { trigger: 'item' };
    delete option.xAxis; delete option.yAxis; delete option.grid;
    const catField = w.fields[0] || '类别';
    const valField = w.fields[1] || '数值';
    option.legend = { top: 0, textStyle: { color: '#6B7280' } };
    option.series = [{
      type: 'pie', radius: ['35%','65%'], center: ['50%','55%'],
      label: { formatter: '{b}: {c} ({d}%)', color: '#6B7280', fontSize: 11 },
      itemStyle: { borderColor: '#fff', borderWidth: 2 },
      data: months.slice(0, 6).map((m, i) => ({ value: Math.round(500 + Math.random() * 1500), name: m, itemStyle: { color: colors[i%colors.length] } }))
    }];
  }
  
  if (w.config.showLabel && w.type !== 'pie') {
    option.series.forEach(s => { s.label = { show: true, fontSize: 10, color: '#6B7280' }; });
  }
  
  chart.setOption(option);
}

// 渲染表格
function rbRenderTable(w) {
  const el = document.getElementById('rb-chart-' + w.id);
  if (!el) return;
  const months = ['1月','2月','3月','4月','5月','6月'];
  const fields = w.fields.length > 0 ? w.fields : ['字段1','字段2','字段3'];
  el.style.height = 'auto';
  el.innerHTML = `
    <table class="rb-table">
      <thead><tr>${fields.map(f => `<th>${f}</th>`).join('')}</tr></thead>
      <tbody>${months.map(m => `<tr>${fields.map((f,i) => `<td ${i>0?'class="num"':''}>${i===0?m:Math.round(100+Math.random()*900).toLocaleString()}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
  `;
}

// 渲染KPI
function rbRenderKPI(w) {
  const el = document.getElementById('rb-chart-' + w.id);
  if (!el) return;
  el.style.height = 'auto';
  const fields = w.fields.length > 0 ? w.fields.slice(0,4) : ['指标1','指标2','指标3','指标4'];
  const kpiColors = ['var(--primary)','var(--success)','var(--warning)','var(--danger)'];
  el.innerHTML = `
    <div class="rb-kpi-grid">
      ${fields.map((f, i) => {
        const val = Math.round(500 + Math.random() * 9500);
        const change = (Math.random() * 20 - 5).toFixed(1);
        return `<div class="rb-kpi">
          <div class="kpi-label">${f}</div>
          <div class="kpi-value" style="color:${kpiColors[i%4]}">${val.toLocaleString()}</div>
          <div class="kpi-change ${change>0?'up':''}">${change>0?'↑':'↓'} ${Math.abs(change)}%</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// 保存报表
function rbSaveReport() {
  const name = rbState.reportName || '未命名报表';
  alert(`报表「${name}」已保存！\n包含 ${rbState.widgets.length} 个组件`);
}

// 预览报表
function rbPreviewReport() {

  alert(`预览报表「${name}」\n包含 ${rbState.widgets.length} 个组件：${rbState.widgets.map(w => w.title).join('、')}`);
}

const lightTheme = {
  color: ['#4A6CF7','#00BCD4','#00C48C','#FFB547','#FF5C72','#8B5CF6','#A78BFA'],
  backgroundColor: 'transparent',
  textStyle: { color: '#6B7280' },
  title: { textStyle: { color: '#1F2937' } },
  legend: { textStyle: { color: '#6B7280' }, pageTextStyle: { color: '#6B7280' } },
  tooltip: {

    borderColor: '#E5E7EB',

  },
  xAxis: { axisLine: { lineStyle: { color: '#E5E7EB' } }, axisLabel: { color: '#6B7280' }, splitLine: { lineStyle: { color: '#F1F5F9' } } },

};

function safeInit(id) {
  const el = document.getElementById(id);
  if (!el) return null;
  if (charts[id]) charts[id].dispose();
  charts[id] = echarts.init(el, null, { renderer: 'canvas' });
  return charts[id];
}

function mergeTheme(opt) {
  opt.backgroundColor = lightTheme.backgroundColor;
  opt.textStyle = { ...lightTheme.textStyle, ...(opt.textStyle || {}) };
  if (opt.tooltip) opt.tooltip = { ...lightTheme.tooltip, ...opt.tooltip };
  else opt.tooltip = { ...lightTheme.tooltip };
  if (!opt.color) opt.color = lightTheme.color;
  // apply to series
  if (opt.series) {
    opt.series.forEach(s => {
      if (s.type === 'bar') {
        s.itemStyle = { borderRadius: [4,4,0,0], ...(s.itemStyle || {}) };
      }
    });
  }
  // grid
  if (!opt.grid) opt.grid = { left: 55, right: 20, top: 40, bottom: 30 };
  // apply axis theme
  ['xAxis','yAxis'].forEach(ax => {
    if (opt[ax]) {
      if (Array.isArray(opt[ax])) {
        opt[ax].forEach(a => { Object.assign(a, lightTheme[ax]); });
      } else {
        Object.assign(opt[ax], lightTheme[ax]);
      }
    }
  });
  if (opt.legend) opt.legend.textStyle = lightTheme.legend.textStyle;
  return opt;
}

function initJpgCharts() {
  const c1 = safeInit('jpg-scatter-chart');

      tooltip: { formatter: p => `月份: ${Math.floor(p.data[0])+1}月<br>周期: ${p.data[1].toFixed(1)}天` },
